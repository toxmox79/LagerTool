<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpedScan - Label für Spedition</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/papaparse@latest/papaparse.min.js"></script>
  <style>
    :root {
      --bg: #e0e5ec;
      --shadow-light: #ffffff;
      --shadow-dark: #a3b1c6;
      --brand: #93c01f;
      --orange: #e67e22;
      --text: #2d3436;
      --text-light: #636e72;
      --error-bg: #fee;
      --error: #900;
      --matched: #d4f7d4;
      --labeled: #fff3e0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1rem;
      transition: all 0.3s ease;
    }
    .container { max-width: 960px; margin: 0 auto; }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    h1 { font-size: 1.5rem; font-weight: 700; }
    .home-btn {
      width: 44px; height: 44px; border-radius: 14px; background: var(--bg);
      box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
      border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 1.25rem; color: var(--text); text-decoration: none; transition: all 0.2s;
    }
    .home-btn:active { box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light); }

    .mode-switch {
      display: flex; gap: 1rem; margin-bottom: 1.5rem; background: var(--bg);
      padding: 0.5rem; border-radius: 20px;
      box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
    }
    .mode-btn {
      flex: 1; padding: 0.75rem; border-radius: 16px; border: none; background: transparent;
      cursor: pointer; font-weight: 700; color: var(--text-light); transition: all 0.2s;
    }
    .mode-btn.active.green { color: var(--brand); background: var(--bg); box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light); }
    .mode-btn.active.orange { color: var(--orange); background: var(--bg); box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light); }

    .neo-card {
      border-radius: 20px; background: var(--bg);
      box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
      padding: 1.5rem; margin-bottom: 1.5rem;
    }
    .neo-card h3 { font-size: 1.1rem; margin-bottom: 1rem; }
    label { font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 0.4rem; }
    .neo-input {
      width: 100%; padding: 0.75rem 1rem; border: none; border-radius: 14px; background: var(--bg);
      box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
      font-size: 0.95rem; color: var(--text); outline: none;
    }
    .file-input-wrap input[type="file"] {
      width: 100%; padding: 0.75rem 1rem; border-radius: 14px; background: var(--bg);
      box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
      font-size: 0.85rem; color: var(--text-light); cursor: pointer;
    }
    .file-input-wrap input[type="file"]::file-selector-button {
      background: var(--brand); color: #fff; border: none; padding: 0.5rem 1rem; border-radius: 10px;
      font-size: 0.85rem; font-weight: 600; cursor: pointer; margin-right: 0.75rem;
    }
    body.mode-bekleben .file-input-wrap input[type="file"]::file-selector-button { background: var(--orange); }

    .error-box {
      background: var(--error-bg); color: var(--error); padding: 0.75rem 1rem; border-radius: 14px;
      text-align: center; margin-bottom: 1rem; font-size: 0.9rem;
    }
    .scan-status { text-align: center; margin-top: 1rem; font-size: 0.9rem; }
    .scan-status .accent { color: var(--brand); font-weight: 700; }
    body.mode-bekleben .scan-status .accent { color: var(--orange); }

    .status-panel {
      background: var(--bg); border-radius: 16px; padding: 1rem; margin-top: 1rem;
      box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
    }
    .table-wrap {
      background: var(--bg); box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
      border-radius: 16px; overflow-x: auto; margin-top: 1rem;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.6rem 0.75rem; text-align: left; font-size: 0.85rem; }
    th { font-weight: 600; background: var(--bg); box-shadow: inset 2px 2px 4px var(--shadow-dark), inset -2px -2px 4px var(--shadow-light); }
    tr.labeled td { background: var(--labeled); opacity: 0.7; }
    tr.matched td { background: var(--matched); opacity: 1; }
    .no-data { text-align: center; padding: 1.5rem; color: var(--text-light); }
    
    .bekleben-display { text-align: center; padding: 1rem; }
    .bekleben-num { font-size: 5rem; font-weight: 900; color: var(--orange); line-height: 1; margin: 0.5rem 0; }
    
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(224, 229, 236, 0.9);
      display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(8px);
    }
    .modal-card {
      background: var(--bg); border-radius: 30px; padding: 2rem; max-width: 95%; width: 500px;
      box-shadow: 15px 15px 30px var(--shadow-dark), -15px -15px 30px var(--shadow-light);
    }
    .selection-btn {
      width: 100%; padding: 1.25rem; margin-bottom: 1rem; border-radius: 18px; border: none; background: var(--bg);
      box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
      cursor: pointer; text-align: left; transition: all 0.2s;
    }
    .selection-btn:active { box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light); }
    .btn-skip {
      width: 100%; padding: 1rem; border-radius: 14px; border: none; background: #4b4b4b; color: white;
      font-weight: 700; cursor: pointer; margin-top: 0.5rem;
    }
    ul { margin: 0.5rem 0 0.5rem 1.5rem; font-size: 0.85rem; }
  </style>
</head>
<body class="mode-kontroll">
  <div id="root" class="container"></div>
  <script>
    const { createRoot } = ReactDOM;
    const root = createRoot(document.getElementById('root'));

    let audioEnabled = false;
    let fallbackSounds = {};

    const soundFiles = { positive: 'sounds/positive.mp3', negative: 'sounds/negative.mp3', confirm: 'sounds/confirm.mp3' };

    async function initAudio() {
      if (audioEnabled) return true;
      try {
        const warmupPromises = Object.entries(soundFiles).map(([name, url]) => {
          return new Promise((resolve) => {
            const audio = new Audio(url);
            audio.preload = 'auto';
            fallbackSounds[name] = audio;
            audio.muted = true;
            audio.play().then(() => {
              audio.pause();
              audio.currentTime = 0;
              audio.muted = false;
              resolve(true);
            }).catch(() => resolve(true));
          });
        });
        await Promise.all(warmupPromises);
        audioEnabled = true;
        return true;
      } catch (error) {
        return false;
      }
    }

    function playSound(name) {
      if (!audioEnabled) return;
      const sound = fallbackSounds[name];
      if (sound) {
        try {
          sound.currentTime = 0;
          sound.play().catch(() => {});
        } catch (e) {}
      }
    }

    function speak(text) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'de-DE';
      window.speechSynthesis.speak(utterance);
    }

    function toStringSafe(v) {
      if (v === null || v === undefined) return '';
      if (typeof v === 'number') return String(Math.trunc(v));
      return String(v).trim();
    }

    function normalizePackageNumber(packageNumber, fileName) {
      const pkgStr = toStringSafe(packageNumber);
      if (!fileName) return pkgStr;
      if (fileName.toLowerCase().includes('geis') && pkgStr.length > 3) return pkgStr.slice(0, -3);
      return pkgStr;
    }

    function App() {
      const [appMode, setAppMode] = React.useState('kontroll');
      const [data, setData] = React.useState([]);
      const [currentScan, setCurrentScan] = React.useState(null);
      const [scanMode, setScanMode] = React.useState('package');
      const [matchedRows, setMatchedRows] = React.useState(new Set());
      const [labeledIndices, setLabeledIndices] = React.useState(new Set());
      const [selectionCandidates, setSelectionCandidates] = React.useState(null);
      const [activeBeklebenPackage, setActiveBeklebenPackage] = React.useState(null);
      const [sonderfallState, setSonderfallState] = React.useState(null);
      const [error, setError] = React.useState(null);
      const [scanInput, setScanInput] = React.useState('');
      const [uploadedFileName, setUploadedFileName] = React.useState('');
      const [audioReady, setAudioReady] = React.useState(false);
      const inputRef = React.useRef(null);

      React.useEffect(() => {
        document.body.className = `mode-${appMode}`;
      }, [appMode]);

      React.useEffect(() => {
        const tryUnlockAudio = async () => { if (!audioEnabled) { const success = await initAudio(); if (success) setAudioReady(true); } };
        const events = ['click', 'touchstart', 'keydown'];
        events.forEach(e => document.addEventListener(e, tryUnlockAudio, { once: true }));
        return () => events.forEach(e => document.removeEventListener(e, tryUnlockAudio));
      }, []);

      const handleFileUpload = (event) => {
        const file = event.target.files[0];
        if (file) {
          setUploadedFileName(file.name);
          Papa.parse(file, {
            header: true, skipEmptyLines: true,
            transformHeader: (h) => h.trim().replace(/^"|"$/g, ''),
            transform: (v) => (v ?? '').toString().trim().replace(/^"|"$/g, ''),
            complete: (results) => {
              const orderGroups = {};
              const allUniquePackageNumbers = new Set();
              let processedRows = [];

              results.data.forEach(row => {
                if (row['OrderItem.orderItemName'] === 'Versandkosten') return;
                const oid = toStringSafe(row['Order.id']);
                if (!orderGroups[oid]) orderGroups[oid] = { rows: [], pkgs: new Set() };
                orderGroups[oid].rows.push(row);

                const pkgKeys = ['ShippingPackages.packageNumber', 'Paketnummer', 'PackageNumber'];
                const key = pkgKeys.find(k => row[k]);
                const rawVal = key ? toStringSafe(row[key]) : '';
                if (rawVal.includes(',')) {
                  rawVal.split(',').forEach(p => { 
                    const clean = p.trim().replace(/\D/g, ''); 
                    if (clean) orderGroups[oid].pkgs.add(clean); 
                  });
                } else {
                  const clean = rawVal.replace(/\D/g, ''); 
                  if (clean) orderGroups[oid].pkgs.add(clean);
                }
              });

              Object.values(orderGroups).forEach(group => {
                const parts = [...group.pkgs].sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }));
                parts.forEach(p => allUniquePackageNumbers.add(p));

                if (parts.length > 1) {
                  // Duplicate all physical items for every label available for this customer
                  parts.forEach((p, pIdx) => {
                    group.rows.forEach((row, rIdx) => {
                      const qtyTotal = parseInt(row['OrderItem.quantity'], 10) || 0;
                      // Create an entry for each unit of quantity
                      for (let i = 0; i < qtyTotal; i++) {
                        const newRow = { 
                          ...row, 
                          _isSonderfall: true, 
                          _allPackageNumbers: parts,
                          _itemRef: `${row['Order.id']}-${rIdx}-${i}`, // Tracks the actual physical item across labels
                          'OrderItem.quantity': '1'
                        };
                        const key = ['ShippingPackages.packageNumber', 'Paketnummer', 'PackageNumber'].find(k => row[k] !== undefined) || 'Paketnummer';
                        newRow[key] = p;
                        processedRows.push(newRow);
                      }
                    });
                  });
                } else {
                  // Single label order
                  group.rows.forEach(row => {
                    const key = ['ShippingPackages.packageNumber', 'Paketnummer', 'PackageNumber'].find(k => row[k]);
                    if (key) row[key] = parts[0] || '';
                    processedRows.push(row);
                  });
                }
              });

              // Step 2: Sort ALL unique package numbers to create a global seqNr mapping
              const sortedAllPkgs = [...allUniquePackageNumbers].sort((a, b) =>
                a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' })
              );
              const packageToSeqNr = {};
              sortedAllPkgs.forEach((pkg, i) => packageToSeqNr[pkg] = i + 1);

              // Step 3: Sort processed rows by their current package number
              processedRows.sort((a, b) => {
                const valA = getRowPkgNum(a);
                const valB = getRowPkgNum(b);
                return valA.localeCompare(valB, undefined, { numeric: true, sensitivity: 'base' });
              });

              // Step 4: Assign seqNr to each row
              processedRows.forEach(row => {
                const pkg = getRowPkgNum(row);
                row.seqNr = packageToSeqNr[pkg] || 0;
                if (row._isSonderfall && row._allPackageNumbers) {
                  row._allSeqNrs = row._allPackageNumbers.map(p => packageToSeqNr[p]).sort((a, b) => a - b);
                }
              });

      // Step 5: Explode by quantity
              let explodedData = [];
              let oIndex = 0;
              processedRows.forEach((row) => {
                // If the row was already part of a multi-label split, quantity is already 1
                const qtyVal = row._itemRef ? 1 : (parseInt(row['OrderItem.quantity'], 10) || 0);
                const qtyToLoop = Math.max(1, qtyVal);
                
                for (let i = 0; i < qtyToLoop; i++) {
                  explodedData.push({ 
                    ...row, 
                    'OrderItem.quantity': qtyToLoop === 1 && qtyVal === 0 ? '0' : '1', 
                    originalIndex: oIndex++ 
                  });
                }
              });

              setData(explodedData);
              setMatchedRows(new Set());
              setLabeledIndices(new Set());
              setCurrentScan(null);
              setActiveBeklebenPackage(null);
              setSonderfallState(null);
              setScanMode('package');
              setError(null);
            },
            error: (err) => setError('Fehler: ' + err.message),
          });
        }
      };

      const handleScanInput = (e) => {
        if (e.key === 'Enter' && scanInput) { handleScan(scanInput.trim()); setScanInput(''); }
        else setScanInput(e.target.value);
      };

      const getRowPkgNum = (row) => toStringSafe(row['ShippingPackages.packageNumber'] || row['Paketnummer'] || row['PackageNumber']);

      const processBekleben = (row) => {
        const newLabeled = new Set([...labeledIndices, row.originalIndex]);
        setLabeledIndices(newLabeled);
        setSelectionCandidates(null);

        const pkgNum = getRowPkgNum(row).toLowerCase();
        let hasMore = false;

        if (pkgNum && pkgNum !== "") {
            const remainingInPkg = data.filter(r => 
                getRowPkgNum(r).toLowerCase() === pkgNum && 
                !newLabeled.has(r.originalIndex)
            );

            if (remainingInPkg.length > 0) {
                hasMore = true;
                setActiveBeklebenPackage({
                    packageNumber: pkgNum,
                    recipient: (row['DeliveryAddress.firstName'] || '') + ' ' + (row['DeliveryAddress.lastName'] || ''),
                    remainingCount: remainingInPkg.length
                });
            } else {
                setActiveBeklebenPackage(null);
            }
        } else {
            setActiveBeklebenPackage(null);
        }

        if (hasMore) {
            speak(row.seqNr.toString() + ", und Hinweis, weitere Artikel");
        } else {
            speak(row.seqNr.toString());
        }
      };

      // --- Sonderfall: finish scanning for current label ---
      const finishSonderfall = () => {
        if (!sonderfallState) return;
        const { orderId, scannedIndices, allSeqNrs, currentSeqNr } = sonderfallState;
        
        const scannedRows = data.filter(r => scannedIndices.includes(r.originalIndex));
        const scannedItemsRefs = new Set(scannedRows.map(r => r._itemRef));
        
        const assignedNr = currentSeqNr || allSeqNrs[0];
        const labelObj = sonderfallState.availableLabels.find(l => l.seqNr === assignedNr);
        const assignedPkgNum = labelObj ? labelObj.pkgNum : '';
        const remainingSeqNrs = allSeqNrs.filter(n => n !== assignedNr);

        // Find the correct key for package number
        const getPkgKey = (r) => ['ShippingPackages.packageNumber', 'Paketnummer', 'PackageNumber'].find(k => r[k] !== undefined) || 'Paketnummer';

        // 1. Mark scanned rows as labeled and update their label/pkg
        const assignedRows = scannedRows.map(r => {
            const updated = { ...r, seqNr: assignedNr };
            updated[getPkgKey(r)] = assignedPkgNum;
            return updated;
        });

        // 2. Identify remaining physical items that were NOT scanned
        const allOrderRows = data.filter(r => r['Order.id'] === orderId);
        const allItemRefs = [...new Set(allOrderRows.map(r => r._itemRef))];
        const unassignedItemRefs = allItemRefs.filter(ref => !scannedItemsRefs.has(ref));
        
        const redistributedRows = [];
        unassignedItemRefs.forEach((ref, i) => {
            // Find an unlabeled row for this item ref from the current data
            const proto = allOrderRows.find(r => r._itemRef === ref && !labeledIndices.has(r.originalIndex));
            if (proto) {
                const updated = { ...proto };
                const targetSeq = remainingSeqNrs[Math.min(i, remainingSeqNrs.length - 1)] || assignedNr;
                const targetLabel = sonderfallState.availableLabels.find(l => l.seqNr === targetSeq);
                updated.seqNr = targetSeq;
                if (targetLabel) updated[getPkgKey(updated)] = targetLabel.pkgNum;
                redistributedRows.push(updated);
            }
        });

        // 3. Build new data array: remove all old rows of this order and add the new correct ones
        const newData = data.filter(r => r['Order.id'] !== orderId);
        newData.push(...assignedRows);
        newData.push(...redistributedRows);
        
        // Add back any items that were already labeled for this order in previous rounds
        const alreadyLabeledRows = allOrderRows.filter(r => labeledIndices.has(r.originalIndex));
        newData.push(...alreadyLabeledRows);
        
        // Sorting to keep chronological structure
        newData.sort((a, b) => a.seqNr - b.seqNr);

        const newLabeled = new Set([...labeledIndices, ...assignedRows.map(r => r.originalIndex)]);

        setData(newData);
        setLabeledIndices(newLabeled);
        setSonderfallState(null);
        setActiveBeklebenPackage(null);
        playSound('confirm');

        // Announce
        const assignedVal = assignedNr;
        const remainingNrs = remainingSeqNrs.join(', ');
        if (remainingSeqNrs.length > 0) {
          speak(`Fertig. Gescannte Artikel auf Label ${assignedVal}. Verbleibende auf Label ${remainingNrs}.`);
        } else {
          speak(`Fertig. Alle Artikel auf Label ${assignedVal}.`);
        }
      };

      const handleScan = (scannedValue) => {
        setError(null);
        const code = toStringSafe(scannedValue);
        const normalizedScannedCode = normalizePackageNumber(code, uploadedFileName);

        if (appMode === 'kontroll') {
          if (scanMode === 'package') {
            const groupIndexes = data.filter(row => {
              const rowPkgNum = getRowPkgNum(row).toLowerCase();
              const term1 = normalizedScannedCode.toLowerCase();
              const term2 = code.toLowerCase();
              return rowPkgNum === term1 || rowPkgNum === term2;
            }).map(row => row.originalIndex);

            if (groupIndexes.length === 0) {
              playSound('negative');
              setError(`Paketnummer "${code}" nicht gefunden!`);
              setCurrentScan(null);
            } else {
              const items = groupIndexes.map(i => {
                const r = data.find(d => d.originalIndex === i);
                const qty = Math.max(1, parseInt(r['OrderItem.quantity'], 10) || 1);
                return { rowIndex: i, expectedBarcode: toStringSafe(r['VariationBarcode.code']), qtyRequired: qty, qtyRemaining: qty, name: (r['DeliveryAddress.firstName'] || '') + ' ' + (r['DeliveryAddress.lastName'] || ''), itemName: r['OrderItem.orderItemName'] };
              });
              const byBarcode = {};
              for (const it of items) { const key = it.expectedBarcode; if (!key) continue; byBarcode[key] = (byBarcode[key] || 0) + it.qtyRequired; }
              const totalRequired = items.reduce((s, it) => s + it.qtyRequired, 0);
              setCurrentScan({ packageNumber: code, items, byBarcode, totalRequired, totalRemaining: totalRequired });
              setScanMode('barcode'); playSound('positive');
            }
          } else {
            if (!currentScan) return;
            const groups = { ...currentScan.byBarcode };
            const remainingForCode = groups[code] || 0;
            if (remainingForCode > 0) {
              groups[code] = remainingForCode - 1;
              const items = currentScan.items.map(it => (it.expectedBarcode === code && it.qtyRemaining > 0) ? { ...it, qtyRemaining: it.qtyRemaining - 1 } : it);
              const totalRemaining = currentScan.totalRemaining - 1;
              if (totalRemaining > 0) {
                setCurrentScan({ ...currentScan, byBarcode: groups, items, totalRemaining });
                playSound('positive');
              } else {
                setMatchedRows(prev => new Set([...prev, ...items.map(it => it.rowIndex)]));
                playSound('confirm'); setCurrentScan(null); setScanMode('package');
              }
            } else {
              playSound('negative'); setError('Falscher Barcode. Bitte erneut die Paketnummer scannen.');
              setCurrentScan(null); setScanMode('package');
            }
          }
        } else {
          // --- BEKLEBEN MODE ---

          // If we are currently in Sonderfall scanning mode, add to the scanned list
          if (sonderfallState) {
            const sfOrderId = sonderfallState.orderId;
            const match = data.find(row =>
              row['Order.id'] === sfOrderId &&
              toStringSafe(row['VariationBarcode.code']) === code &&
              !labeledIndices.has(row.originalIndex) &&
              !sonderfallState.scannedIndices.includes(row.originalIndex)
            );
            if (match) {
              playSound('positive');
              setSonderfallState(prev => ({
                ...prev,
                scannedIndices: [...prev.scannedIndices, match.originalIndex],
                scannedItems: [...prev.scannedItems, { index: match.originalIndex, name: match['OrderItem.orderItemName'], ean: code }]
              }));
            } else {
              playSound('negative');
              setError('EAN nicht gefunden für diesen Auftrag oder bereits gescannt!');
            }
            return;
          }

          // Normal Bekleben flow
          let candidates = [];
          if (activeBeklebenPackage) {
              candidates = data.filter(row => 
                getRowPkgNum(row).toLowerCase() === activeBeklebenPackage.packageNumber.toLowerCase() &&
                toStringSafe(row['VariationBarcode.code']) === code &&
                !labeledIndices.has(row.originalIndex)
              );

              if (candidates.length === 0) {
                  playSound('negative');
                  setError(`Falsche EAN für Sendung ${activeBeklebenPackage.packageNumber}!`);
                  return;
              }
          } else {
              const candidateRows = data.filter(row => 
                toStringSafe(row['VariationBarcode.code']) === code && !labeledIndices.has(row.originalIndex)
              );
              const groupedByPackage = new Map();
              candidateRows.forEach(row => {
                const pkg = getRowPkgNum(row).toLowerCase();
                if (!groupedByPackage.has(pkg)) {
                  groupedByPackage.set(pkg, row);
                }
              });
              candidates = Array.from(groupedByPackage.values());
          }

          if (candidates.length === 0) {
            playSound('negative'); setError('EAN nicht gefunden oder bereits beklebt!');
            return;
          }

          // Check if this candidate is a Sonderfall (multi-shipment order)
          const candidate = candidates[0];
          if (candidate._isSonderfall && candidate._allSeqNrs && candidate._allSeqNrs.length > 1) {
            // Check if there are still multiple unlabeled labels for this order
            const orderId = candidate['Order.id'];
            const unlabeledOrderRows = data.filter(r =>
              r['Order.id'] === orderId && !labeledIndices.has(r.originalIndex)
            );

            // Get unique pairs of seqNr and pkgNum for label choice
            const availableLabels = [];
            const seenSeq = new Set();
            unlabeledOrderRows.forEach(r => {
              if (!seenSeq.has(r.seqNr)) {
                seenSeq.add(r.seqNr);
                availableLabels.push({ seqNr: r.seqNr, pkgNum: getRowPkgNum(r) });
              }
            });
            availableLabels.sort((a, b) => a.seqNr - b.seqNr);

            if (availableLabels.length > 1) {
              const actualItemsCount = unlabeledOrderRows.filter(r => r['OrderItem.quantity'] !== '0').length;
              if (actualItemsCount === 0) {
                   // Only dummies left, don't enter Sonderfall, just process normally
                   processBekleben(candidate);
                   return;
              }

              // Enter Sonderfall mode
              playSound('positive');
              speak('Sonderfall. Bitte Label wählen und E A N s scannen.');
              const recipient = (candidate['DeliveryAddress.firstName'] || '') + ' ' + (candidate['DeliveryAddress.lastName'] || '');
              
              setSonderfallState({
                orderId: orderId,
                availableLabels: availableLabels,
                allSeqNrs: availableLabels.map(l => l.seqNr),
                currentSeqNr: availableLabels[0].seqNr, // Default to first available
                recipient: recipient,
                totalItems: actualItemsCount,
                scannedIndices: [candidate.originalIndex],
                scannedItems: [{ index: candidate.originalIndex, name: candidate['OrderItem.orderItemName'], ean: code }]
              });
              setActiveBeklebenPackage(null);
              setScanInput('');
              return;
            }
          }

          // Normal processing (non-Sonderfall or already resolved)
          const modelNames = [...new Set(candidates.map(c => c['OrderItem.orderItemName'] || ''))];
          if (modelNames.length > 1) {
            setSelectionCandidates(candidates);
          } else {
            processBekleben(candidates[0]);
          }
        }
        if (inputRef.current) inputRef.current.focus();
      };

      React.useEffect(() => { if (inputRef.current) inputRef.current.focus(); }, [appMode]);

      const renderTable = () => {
        if (data.length === 0) return React.createElement('p', { className: 'no-data' }, 'Keine Daten hochgeladen.');
        return React.createElement('div', { className: 'table-wrap' },
          React.createElement('table', null, [
            React.createElement('thead', null, React.createElement('tr', null, [
              React.createElement('th', null, 'NR.'),
              React.createElement('th', null, 'BESTELL-ID'),
              React.createElement('th', null, 'BARCODE'),
              React.createElement('th', null, 'PAKETNUMMER'),
              React.createElement('th', null, 'NAME'),
              React.createElement('th', null, 'ARTIKELNAME'),
              React.createElement('th', null, 'MENGE'),
            ])),
            React.createElement('tbody', null, data.map((row) => {
              const matched = matchedRows.has(row.originalIndex);
              const labeled = !matched && labeledIndices.has(row.originalIndex);
              return React.createElement('tr', { key: row.originalIndex, className: (matched ? 'matched' : '') + ' ' + (labeled ? 'labeled' : '') }, [
                React.createElement('td', null, row.seqNr),
                React.createElement('td', null, row['Order.id']),
                React.createElement('td', null, toStringSafe(row['VariationBarcode.code'])),
                React.createElement('td', null, getRowPkgNum(row)),
                React.createElement('td', null, (row['DeliveryAddress.firstName'] || '') + ' ' + (row['DeliveryAddress.lastName'] || '')),
                React.createElement('td', null, row['OrderItem.orderItemName']),
                React.createElement('td', null, row['OrderItem.quantity']),
              ]);
            }))
          ])
        );
      };

      const renderCurrentScan = () => {
        if (appMode === 'kontroll') {
          if (!currentScan) return React.createElement('p', { className: 'scan-status' }, ['Scannen Sie eine ', React.createElement('span', { className: 'accent' }, 'Paketnummer')]);
          const barcodeList = Object.entries(currentScan.byBarcode).sort((a, b) => a[0].localeCompare(b[0])).filter(([_, count]) => count > 0).map(([ean, count]) => React.createElement('li', { key: ean }, (ean || 'N/A') + ' \u2013 noch ' + count));
          const itemLines = currentScan.items.map((it, idx) => React.createElement('li', { key: idx }, it.itemName + ' (' + (it.expectedBarcode || 'N/A') + '): ' + (it.qtyRequired - it.qtyRemaining) + '/' + it.qtyRequired + ' gescannt'));
          const recipientName = currentScan.items && currentScan.items.length > 0 ? currentScan.items[0].name : 'N/A';
          return React.createElement('div', { className: 'status-panel' },
            React.createElement('div', { className: 'scan-status' }, [
              React.createElement('p', null, ['Gescannte Paketnummer: ', React.createElement('span', { className: 'accent' }, currentScan.packageNumber)]),
              React.createElement('p', null, ['Empf\u00e4nger: ', React.createElement('span', { className: 'accent' }, recipientName)]),
              React.createElement('p', null, 'Gesamt noch: ' + currentScan.totalRemaining + ' von ' + currentScan.totalRequired),
              barcodeList.length > 0 && React.createElement('p', null, 'Benötigte EANs:'),
              barcodeList.length > 0 && React.createElement('ul', { style: { textAlign: 'left', display: 'inline-block' } }, barcodeList),
              React.createElement('p', null, 'Positionen:'),
              React.createElement('ul', { style: { textAlign: 'left', display: 'inline-block' } }, itemLines),
              React.createElement('p', { style: { marginTop: '0.5rem' } }, ['Bitte scannen Sie die ', React.createElement('span', { className: 'accent' }, 'zugehörigen EANs'), ' der Positionen.']),
            ])
          );
        } else {
          // --- Sonderfall active display ---
          if (sonderfallState) {
            const allUnlabeledItems = data.filter(r => 
              r['Order.id'] === sonderfallState.orderId && !labeledIndices.has(r.originalIndex)
            );

            return React.createElement('div', { className: 'status-panel' },
              React.createElement('div', { className: 'bekleben-display' }, [
                React.createElement('div', { style: { background: '#fde8e8', padding: '15px', borderRadius: '16px', marginBottom: '15px', border: '3px solid #c0392b', boxShadow: '0 4px 10px rgba(192, 57, 43, 0.3)' } }, [
                  React.createElement('div', { style: { color: '#c0392b', fontWeight: 900, fontSize: '1.3rem', marginBottom: '5px' } }, '⚠️ SONDERFALL'),
                  React.createElement('div', { style: { fontSize: '1rem', fontWeight: 600 } }, sonderfallState.recipient),
                  React.createElement('div', { style: { fontSize: '0.9rem', fontWeight: 800, color: '#c0392b', marginTop: '5px', background: '#fff', padding: '5px 10px', borderRadius: '8px', display: 'inline-block' } }, 
                    `Ziel-Paket: ${sonderfallState.availableLabels.find(l => l.seqNr === sonderfallState.currentSeqNr)?.pkgNum || ''}`
                  ),
                  
                  React.createElement('p', { style: { fontWeight: 700, marginTop: '10px', marginBottom: '5px', fontSize: '0.9rem' } }, 'Aktuelles Label wählen:'),
                  React.createElement('div', { style: { display: 'flex', gap: '5px', flexWrap: 'wrap', marginBottom: '10px' } }, 
                    sonderfallState.availableLabels.map(l => 
                      React.createElement('button', {
                        key: l.seqNr,
                        onClick: () => setSonderfallState(prev => ({ ...prev, currentSeqNr: l.seqNr })),
                        style: { 
                          padding: '8px 12px', 
                          borderRadius: '8px', 
                          border: 'none', 
                          background: sonderfallState.currentSeqNr === l.seqNr ? '#c0392b' : '#eee',
                          color: sonderfallState.currentSeqNr === l.seqNr ? 'white' : '#2d3436',
                          fontWeight: 700,
                          cursor: 'pointer',
                          fontSize: '0.85rem'
                        }
                      }, `Nr. ${l.seqNr}`)
                    )
                  ),

                  React.createElement('div', { style: { marginTop: '8px', color: '#2d3436', fontSize: '0.9rem', fontWeight: 600 } },
                    `Gescannt: ${sonderfallState.scannedIndices.length} von ${sonderfallState.totalItems} Artikeln`
                  ),

                  React.createElement('div', { style: { marginTop: '10px', borderTop: '1px solid #fab1a0', paddingTop: '10px' } }, [
                    React.createElement('p', { style: { fontWeight: 700, fontSize: '0.85rem', marginBottom: '5px' } }, 'Geräte-Checkliste (Dieser Kunde):'),
                    React.createElement('ul', { style: { textAlign: 'left', margin: '0', paddingLeft: '1.2rem', fontSize: '0.8rem', maxHeight: '150px', overflowY: 'auto' } }, 
                      allUnlabeledItems.filter(r => r['OrderItem.quantity'] !== '0').map(r => {
                        const isScanned = sonderfallState.scannedIndices.includes(r.originalIndex);
                        return React.createElement('li', { 
                          key: r.originalIndex,
                          style: { color: isScanned ? '#27ae60' : '#2d3436', fontWeight: isScanned ? 700 : 400, marginBottom: '2px' } 
                        }, [
                          r['OrderItem.orderItemName'],
                          isScanned && ' ✅'
                        ]);
                      })
                    )
                  ]),

                  React.createElement('button', {
                    onClick: finishSonderfall,
                    style: { marginTop: '15px', width: '100%', padding: '14px', borderRadius: '14px', border: 'none', background: '#27ae60', color: 'white', fontSize: '1.1rem', fontWeight: 900, cursor: 'pointer', boxShadow: '0 4px 10px rgba(39,174,96,0.3)' }
                  }, '✅ ABGESCHLOSSEN'),
                  React.createElement('button', {
                    onClick: () => setSonderfallState(null),
                    style: { marginTop: '8px', width: '100%', padding: '10px', borderRadius: '10px', border: 'none', background: '#ecf0f1', color: '#7f8c8d', fontSize: '0.85rem', fontWeight: 700, cursor: 'pointer' }
                  }, 'Abbrechen')
                ])
              ])
            );
          }

          const lastIndex = Array.from(labeledIndices).pop();
          const lastRow = data.find(r => r.originalIndex === lastIndex);
          return React.createElement('div', { className: 'status-panel' },
            React.createElement('div', { className: 'bekleben-display' }, [
                activeBeklebenPackage && React.createElement('div', { style: { background: '#fff3e0', padding: '15px', borderRadius: '16px', marginBottom: '15px', border: '3px solid #e67e22', boxShadow: '0 4px 10px rgba(230, 126, 34, 0.3)' } }, [
                    React.createElement('div', { style: { color: '#e67e22', fontWeight: 900, fontSize: '1.2rem', marginBottom: '5px' } }, '⚠️ LAUFENDE SENDUNG'),
                    React.createElement('div', { style: { fontSize: '1rem', fontWeight: 600 } }, activeBeklebenPackage.recipient),
                    React.createElement('div', { style: { fontWeight: 700, marginTop: '5px', color: '#2d3436' } }, `Noch ${activeBeklebenPackage.remainingCount} Artikel dieser Sendung offen!`),
                    React.createElement('button', { 
                        onClick: () => setActiveBeklebenPackage(null),
                        style: { marginTop: '10px', padding: '8px 15px', borderRadius: '10px', border: 'none', background: '#ecf0f1', color: '#7f8c8d', fontSize: '0.85rem', fontWeight: 700, cursor: 'pointer', boxShadow: '2px 2px 5px rgba(0,0,0,0.1)' } 
                    }, 'Sitzung beenden')
                ]),
                React.createElement('div', { style: { fontWeight: 600, color: 'var(--text-light)' } }, lastRow ? 'Letzte Nummer:' : 'Bereit zum Bekleben'),
                React.createElement('div', { className: 'bekleben-num' }, lastRow ? lastRow.seqNr : '-'),
                lastRow && React.createElement('div', { style: { fontWeight: 700, fontSize: '1.2rem' } }, lastRow['OrderItem.orderItemName']),
                lastRow && React.createElement('div', { style: { fontWeight: 600, color: 'var(--text-light)', marginTop: '0.4rem' } }, (lastRow['DeliveryAddress.firstName'] || '') + ' ' + (lastRow['DeliveryAddress.lastName'] || '')),
                !lastRow && !activeBeklebenPackage && React.createElement('p', { className: 'scan-status' }, 'Bitte EAN scannen')
            ])
          );
        }
      };

      const renderSelectionModal = () => {
        if (!selectionCandidates) return null;
        return React.createElement('div', { className: 'modal-overlay' },
          React.createElement('div', { className: 'modal-card' }, [
            React.createElement('h2', { style: { marginBottom: '1rem', textAlign: 'center' } }, 'Modell auswählen'),
            selectionCandidates.map(c => 
              React.createElement('button', { key: c.originalIndex, className: 'selection-btn', onClick: () => processBekleben(c) }, [
                React.createElement('div', { style: { fontWeight: 700, fontSize: '1rem' } }, c['OrderItem.orderItemName']),
                React.createElement('div', { style: { fontSize: '0.85rem', color: 'var(--text-light)' } }, `Bestell-ID: ${c['Order.id']} | Nr: ${c.seqNr}`)
              ])
            ),
            React.createElement('button', { className: 'btn-skip', onClick: () => setSelectionCandidates(null) }, 'Überspringen')
          ])
        );
      };

      return React.createElement('div', null, [
        React.createElement('div', { key: 'topbar', className: 'top-bar' }, [
          React.createElement('h1', { key: 'h1' }, 'SpedScan'),
          React.createElement('a', { key: 'home', href: 'index.html', className: 'home-btn', title: 'Zur Startseite' }, '\u2302'),
        ]),
        React.createElement('div', { key: 'modes', className: 'mode-switch' }, [
            React.createElement('button', { key: 'm1', className: 'mode-btn' + (appMode === 'kontroll' ? ' active green' : ''), onClick: () => { setAppMode('kontroll'); setCurrentScan(null); } }, 'Kontroll Modus'),
            React.createElement('button', { key: 'm2', className: 'mode-btn' + (appMode === 'bekleben' ? ' active orange' : ''), onClick: () => { setAppMode('bekleben'); setCurrentScan(null); } }, 'Bekleben Modus'),
        ]),
        error && React.createElement('div', { key: 'error', className: 'error-box' }, error),
        React.createElement('div', { key: 'upload', className: 'neo-card' }, [
          React.createElement('h3', { key: 'title' }, 'Label für Spedition scannen'),
          React.createElement('div', { key: 'file', className: 'file-input-wrap' },
            React.createElement('input', { type: 'file', accept: '.csv', onChange: handleFileUpload })
          ),
        ]),
        React.createElement('div', { key: 'scan', className: 'neo-card' }, [
          React.createElement('label', { key: 'lbl' }, appMode === 'kontroll' ? (uploadedFileName.toLowerCase().includes('geis') ? 'Geis Barcode scannen' : 'Barcode scannen') : 'EAN scannen'),
          React.createElement('input', { key: 'inp', type: 'text', value: scanInput, onChange: (e) => setScanInput(e.target.value), onKeyDown: handleScanInput, ref: inputRef, placeholder: appMode === 'kontroll' ? (scanMode === 'package' ? 'Paketnummer scannen' : 'Barcode scannen') : 'EAN scannen', className: 'neo-input' }),
          renderCurrentScan(),
        ]),
        renderSelectionModal(),
        React.createElement('div', { key: 'table', className: 'neo-card' }, [
          React.createElement('h3', { key: 'th' }, 'Daten'),
          renderTable(),
        ]),
      ]);
    }

    root.render(React.createElement(App));
  </script>
</body>
