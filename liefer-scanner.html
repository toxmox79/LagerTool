<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lieferscanner - Lieferung erfassen</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --bg: #e0e5ec;
      --shadow-light: #ffffff;
      --shadow-dark: #a3b1c6;
      --brand: #93c01f;
      --text: #2d3436;
      --text-light: #636e72;
      --border: rgba(163,177,198,0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1rem;
    }

    .container { max-width: 960px; margin: 0 auto; }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    h1 { font-size: 1.5rem; font-weight: 700; }
    h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.75rem; }

    .home-btn {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: var(--bg);
      box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      color: var(--text);
      text-decoration: none;
      transition: all 0.2s;
    }

    .home-btn:active {
      box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
    }

    .neo-card {
      border-radius: 20px;
      background: var(--bg);
      box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    label {
      font-weight: 600;
      font-size: 0.9rem;
      display: block;
      margin-bottom: 0.4rem;
    }

    .neo-input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: none;
      border-radius: 14px;
      background: var(--bg);
      box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
      font-size: 1rem;
      color: var(--text);
      outline: none;
    }

    .state-selector {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin: 1rem 0;
    }

    .pill {
      padding: 0.5rem 1rem;
      border-radius: 999px;
      background: var(--bg);
      box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--text);
      transition: all 0.2s;
    }

    .pill.active {
      box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
      color: var(--brand);
    }

    .pill:active {
      box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
    }

    .file-input-wrap {
      margin: 0.75rem 0;
    }

    .file-input-wrap input[type="file"] {
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: 14px;
      background: var(--bg);
      box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
      font-size: 0.85rem;
      color: var(--text-light);
      cursor: pointer;
    }

    .file-input-wrap input[type="file"]::file-selector-button {
      background: var(--brand);
      color: #fff;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      margin-right: 0.75rem;
    }

    #fileName { font-size: 0.85rem; color: var(--text-light); margin-top: 0.25rem; }

    .toggle { display: flex; align-items: center; gap: 0.5rem; margin: 0.75rem 0; font-size: 0.9rem; }
    .toggle input { width: 18px; height: 18px; accent-color: var(--brand); }

    .inline-controls { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; margin: 0.75rem 0; }

    .pallet-wrap {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .small-btn {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: var(--bg);
      box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
      border: none;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--brand);
    }

    .small-btn:active {
      box-shadow: inset 2px 2px 4px var(--shadow-dark), inset -2px -2px 4px var(--shadow-light);
    }

    #palletCount {
      width: 70px;
      text-align: center;
      padding: 0.4rem;
      border: none;
      border-radius: 10px;
      background: var(--bg);
      box-shadow: inset 2px 2px 4px var(--shadow-dark), inset -2px -2px 4px var(--shadow-light);
      font-size: 0.95rem;
      color: var(--text);
    }

    .btn-row { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 0.75rem; }

    .neo-btn {
      padding: 0.75rem 1.25rem;
      border-radius: 14px;
      background: var(--bg);
      box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--text);
      transition: all 0.2s;
    }

    .neo-btn:active {
      box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
    }

    .neo-btn.brand {
      background: var(--brand);
      color: #fff;
    }

    .neo-btn.brand:active {
      box-shadow: inset 3px 3px 6px rgba(0,0,0,0.2), inset -3px -3px 6px rgba(255,255,255,0.1);
    }

    .table-wrap {
      background: var(--bg);
      box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
      border-radius: 16px;
      overflow-x: auto;
      margin-top: 1rem;
    }

    table { width: 100%; border-collapse: collapse; }

    th, td {
      padding: 0.6rem 0.75rem;
      text-align: left;
      font-size: 0.85rem;
    }

    th {
      font-weight: 600;
      background: var(--brand);
      color: #fff;
    }

    td { border-bottom: 1px solid var(--border); }

    .state-controls { display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; }

    .state-chip {
      display: flex;
      align-items: center;
      gap: 0.2rem;
      padding: 0.2rem;
      border-radius: 8px;
      background: var(--bg);
      box-shadow: inset 2px 2px 4px var(--shadow-dark), inset -2px -2px 4px var(--shadow-light);
    }

    .state-chip label { font-size: 0.8rem; margin: 0 0.15rem 0 0; min-width: 1.2rem; text-align: center; font-weight: 600; }

    .state-chip input {
      width: 45px;
      text-align: center;
      padding: 0.2rem;
      border: none;
      border-radius: 6px;
      background: var(--bg);
      box-shadow: inset 1px 1px 2px var(--shadow-dark), inset -1px -1px 2px var(--shadow-light);
      font-size: 0.8rem;
      color: var(--text);
    }

    .state-chip .mini-btn {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: var(--bg);
      box-shadow: 2px 2px 4px var(--shadow-dark), -2px -2px 4px var(--shadow-light);
      border: none;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--brand);
    }

    .state-chip .mini-btn:active {
      box-shadow: inset 1px 1px 2px var(--shadow-dark), inset -1px -1px 2px var(--shadow-light);
    }

    .settings-card { margin-top: 0.75rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <h1>Lieferscanner</h1>
      <a href="index.html" class="home-btn" title="Zur Startseite">&#8962;</a>
    </div>

    <div class="neo-card">
      <h2>Lieferung erfassen mit Testgewichten</h2>
      <label for="barcodeInput">Barcode-Eingabe (mit Handscanner):</label>
      <input type="text" id="barcodeInput" placeholder="Scanne hier den Barcode" class="neo-input" autofocus autocomplete="off"/>

      <div class="state-selector" aria-label="Zustand für nächsten Scan wählen">
        <span style="font-weight:600; font-size:0.9rem; margin-right:0.25rem;">Scan-Zustand:</span>
        <button type="button" class="pill active" data-state="A">A-Ware</button>
        <button type="button" class="pill" data-state="B">B-Ware</button>
        <button type="button" class="pill" data-state="C">C-Ware</button>
      </div>

      <div class="file-input-wrap">
        <input type="file" id="csvFile" accept=".csv"/>
      </div>
      <div id="fileName"></div>

      <div class="neo-card settings-card">
        <h2>Einstellungen</h2>
        <label class="toggle">
          <input type="checkbox" id="ttsToggle"/>
          Sprachausgabe aktivieren
        </label>
        <div class="inline-controls">
          <label style="margin:0;">Palettenerfassung</label>
          <div class="pallet-wrap">
            <button type="button" id="palletMinus" class="small-btn" aria-label="Palette minus">&minus;</button>
            <input type="number" id="palletCount" value="0" min="0" step="1" inputmode="numeric" aria-label="Anzahl Paletten"/>
            <button type="button" id="palletPlus" class="small-btn" aria-label="Palette plus">+</button>
          </div>
          <small style="font-size:0.75rem; color:var(--text-light);">(Tasten +/&minus; verändern ebenfalls)</small>
        </div>
      </div>

      <div class="btn-row">
        <button type="button" id="btnExportXls" class="neo-btn brand" title="Als Excel öffnen/speichern">Als XLS speichern</button>
        <button type="button" id="btnReset" class="neo-btn" title="Erfassung zurücksetzen">Zurücksetzen</button>
        <button type="button" id="btnFinalize" class="neo-btn brand" title="Vorgang abschließen">Abschließen</button>
      </div>
    </div>

    <div class="neo-card">
      <h2>Erfasste Daten</h2>
      <div class="table-wrap">
        <table id="resultTable" aria-live="polite">
          <thead>
            <tr>
              <th>Barcode</th>
              <th>Menge (&Sigma;)</th>
              <th>Zustand (A/B/C)</th>
              <th>ItemTextName</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let scannedData = {};
    let barcodeMap = {};
    let scanOrder = [];
    let currentState = 'A';

    let audioCtx = null;
    function beep(freq = 880, durationMs = 120, volume = 0.12, type = 'sine') {
      try {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + durationMs / 1000);
      } catch (e) {}
    }

    const ttsToggle = document.getElementById('ttsToggle');
    function speak(text) {
      if (!ttsToggle.checked) return;
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'de-DE';
        window.speechSynthesis.speak(u);
      }
    }

    const selector = document.querySelector('.state-selector');
    selector.addEventListener('click', (e) => {
      const btn = e.target.closest('.pill');
      if (!btn) return;
      currentState = btn.getAttribute('data-state');
      selector.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p === btn));
      speak(currentState + '-Ware gewählt');
    });

    function normalizeHeader(h) {
      return h.replace(/^\uFEFF/, '').replace(/^"+|"+$/g, '').trim().toLowerCase();
    }

    function splitRespectingQuotes(line, delim) {
      const out = []; let cur = ''; let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { if (inQuotes && line[i + 1] === '"') { cur += '"'; i++; } else { inQuotes = !inQuotes; } }
        else if (ch === delim && !inQuotes) { out.push(cur); cur = ''; }
        else { cur += ch; }
      }
      out.push(cur); return out;
    }

    function countDelim(line, delim) {
      let inQuotes = false, c = 0;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { if (inQuotes && line[i + 1] === '"') { i++; } else { inQuotes = !inQuotes; } }
        else if (ch === delim && !inQuotes) { c++; }
      }
      return c;
    }

    function detectDelimiter(firstLine) {
      const candidates = [';', ',', '\t'];
      let best = ';', bestCount = -1;
      for (const cand of candidates) {
        const count = countDelim(firstLine, cand === '\t' ? '\t' : cand);
        if (count > bestCount) { bestCount = count; best = cand; }
      }
      return best === '\t' ? '\t' : best;
    }

    const csvFile = document.getElementById('csvFile');
    const fileNameSpan = document.getElementById('fileName');

    csvFile.addEventListener('change', handleCSV);
    function handleCSV(event) {
      const file = event.target.files[0];
      if (!file) return;
      fileNameSpan.textContent = file.name;
      const reader = new FileReader();
      reader.onload = function (e) {
        const raw = e.target.result;
        const text = raw.replace(/\r/g, '');
        const lines = text.split('\n').filter(r => r.trim().length > 0);
        if (lines.length === 0) { alert('Die CSV ist leer.'); return; }
        const delim = detectDelimiter(lines[0]);
        const headerRaw = splitRespectingQuotes(lines[0], delim);
        const headers = headerRaw.map(normalizeHeader);
        const wantBarcode = 'variationbarcode.code';
        const wantName = 'itemtextname';
        const barcodeIndex = headers.indexOf(wantBarcode);
        const nameIndex = headers.indexOf(wantName);
        if (barcodeIndex === -1 || nameIndex === -1) {
          alert('CSV-Problem:\nErwartete Spalten: "VariationBarcode.code" und "ItemTextName".\nErkannter Trenner: ' + (delim === '\t' ? 'TAB' : delim) + '\nGefundene Kopfzeilen: ' + headerRaw.join(', '));
          return;
        }
        barcodeMap = {};
        for (let i = 1; i < lines.length; i++) {
          const cols = splitRespectingQuotes(lines[i], delim);
          if (cols.length > Math.max(barcodeIndex, nameIndex)) {
            const code = (cols[barcodeIndex] || '').replace(/^"+|"+$/g, '').trim();
            const name = (cols[nameIndex] || '').replace(/^"+|"+$/g, '').trim();
            if (code) barcodeMap[code] = name || '';
          }
        }
        updateTable();
        speak('Testgewichte geladen.');
      };
      reader.readAsText(file);
    }

    document.getElementById('barcodeInput').addEventListener('keydown', function (event) {
      if (event.key === 'Enter') {
        const barcode = event.target.value.trim();
        if (barcode) {
          if (!scannedData[barcode]) scannedData[barcode] = { A: 0, B: 0, C: 0 };
          scannedData[barcode][currentState]++;
          const idx = scanOrder.indexOf(barcode);
          if (idx !== -1) scanOrder.splice(idx, 1);
          scanOrder.unshift(barcode);
          updateTable();
          beep();
          const name = barcodeMap[barcode] ? (barcodeMap[barcode] + ', ') : '';
          const total = totalFor(scannedData[barcode]);
          speak(name + currentState + '-Ware, Gesamt ' + total);
          event.target.value = '';
        }
      }
    });

    function totalFor(entry) { return (entry?.A || 0) + (entry?.B || 0) + (entry?.C || 0); }

    function entriesByScanOrder() {
      return scanOrder.filter(bc => scannedData[bc] !== undefined).map(bc => [bc, scannedData[bc]]);
    }

    function updateTable() {
      const tbody = document.querySelector('#resultTable tbody');
      tbody.innerHTML = '';
      for (const [barcode, entry] of entriesByScanOrder()) {
        const row = document.createElement('tr');
        const tdBarcode = document.createElement('td');
        tdBarcode.textContent = barcode;
        const tdTotal = document.createElement('td');
        tdTotal.textContent = String(totalFor(entry));
        const tdState = document.createElement('td');
        tdState.appendChild(renderStateControls(barcode, entry));
        const tdName = document.createElement('td');
        tdName.textContent = barcodeMap[barcode] || '-';
        row.appendChild(tdBarcode);
        row.appendChild(tdTotal);
        row.appendChild(tdState);
        row.appendChild(tdName);
        tbody.appendChild(row);
      }
    }

    function renderStateControls(barcode, entry) {
      const wrap = document.createElement('div');
      wrap.className = 'state-controls';
      ['A', 'B', 'C'].forEach(state => {
        const chip = document.createElement('div');
        chip.className = 'state-chip';
        const lbl = document.createElement('label');
        lbl.textContent = state;
        const minus = document.createElement('button');
        minus.type = 'button'; minus.className = 'mini-btn'; minus.textContent = '\u2212';
        const inp = document.createElement('input');
        inp.type = 'number'; inp.min = 0; inp.step = 1; inp.value = entry[state] || 0;
        inp.setAttribute('aria-label', 'Anzahl ' + state + '-Ware');
        const plus = document.createElement('button');
        plus.type = 'button'; plus.className = 'mini-btn'; plus.textContent = '+';
        minus.onclick = () => { if (scannedData[barcode][state] > 0) { scannedData[barcode][state]--; updateTable(); } };
        plus.onclick = () => { scannedData[barcode][state]++; updateTable(); };
        inp.addEventListener('change', () => {
          let v = parseInt(inp.value, 10);
          if (isNaN(v) || v < 0) v = entry[state] || 0;
          scannedData[barcode][state] = v; updateTable();
        });
        chip.appendChild(lbl); chip.appendChild(minus); chip.appendChild(inp); chip.appendChild(plus);
        wrap.appendChild(chip);
      });
      return wrap;
    }

    let palletCount = 0;
    const palletInput = document.getElementById('palletCount');
    const palletPlus = document.getElementById('palletPlus');
    const palletMinus = document.getElementById('palletMinus');
    function syncPallet() { palletInput.value = palletCount; }
    function incPallet() { palletCount++; syncPallet(); speak('Paletten: ' + palletCount); }
    function decPallet() { if (palletCount > 0) { palletCount--; syncPallet(); speak('Paletten: ' + palletCount); } }
    palletPlus.addEventListener('click', incPallet);
    palletMinus.addEventListener('click', decPallet);
    palletInput.addEventListener('change', () => { const v = parseInt(palletInput.value, 10); palletCount = isNaN(v) || v < 0 ? 0 : v; syncPallet(); });
    document.addEventListener('keydown', (e) => {
      const ae = document.activeElement;
      const isInput = ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA' || ae.isContentEditable);
      if (isInput && ae !== document.body) return;
      if (e.key === '+' || e.key === 'Add') incPallet();
      if (e.key === '-' || e.key === 'Subtract') decPallet();
    });

    function exportXls() {
      const rows = Object.entries(scannedData).sort((a, b) => a[0].localeCompare(b[0], 'de'));
      const timestamp = new Date().toISOString().replace(/[:T]/g, '-').slice(0, 19);
      let tableHtml = '<table border="1"><thead><tr><th>Barcode</th><th>Menge (&Sigma;)</th><th>A</th><th>B</th><th>C</th><th>ItemTextName</th></tr></thead><tbody>';
      for (const [barcode, entry] of rows) {
        const name = (barcodeMap[barcode] || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        const total = totalFor(entry);
        tableHtml += '<tr><td>' + barcode + '</td><td>' + total + '</td><td>' + (entry.A || 0) + '</td><td>' + (entry.B || 0) + '</td><td>' + (entry.C || 0) + '</td><td>' + name + '</td></tr>';
      }
      tableHtml += '</tbody></table>';
      const summary = '<p><strong>Paletten:</strong> ' + palletCount + '</p>';
      const htmlDoc = '<html><head><meta charset="utf-8"></head><body><h3>Barcode-Erfassung</h3><p><strong>Exportzeit:</strong> ' + new Date().toLocaleString() + '</p>' + summary + tableHtml + '</body></html>';
      const blob = new Blob(['\ufeff' + htmlDoc], { type: 'application/vnd.ms-excel' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'barcode_export_' + timestamp + '.xls';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function resetAll() {
      if (!confirm('Wirklich alles zurücksetzen?\nMengen, Tabelle und Palettenerfassung werden geleert.')) return;
      scannedData = {}; scanOrder = []; palletCount = 0;
      syncPallet(); updateTable(); beep(440, 80);
    }

    function finalize() {
      const doExport = confirm('Vorgang abschließen?\nMöchten Sie die Erfassung vorher als XLS speichern?\nOK = Speichern & Abschließen, Abbrechen = nur Abschließen');
      if (doExport) exportXls();
      scannedData = {}; scanOrder = [];
      updateTable(); beep(660, 150);
      alert('Erfassung abgeschlossen.');
    }

    document.getElementById('btnExportXls').addEventListener('click', exportXls);
    document.getElementById('btnReset').addEventListener('click', resetAll);
    document.getElementById('btnFinalize').addEventListener('click', finalize);
  </script>
</body>
</html>
