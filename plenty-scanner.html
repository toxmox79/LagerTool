<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlentyScanner - Wareneingang OSF</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #e0e5ec;
      --shadow-light: #ffffff;
      --shadow-dark: #a3b1c6;
      --brand: #93c01f;
      --brand-dark: #7fa31a;
      --text: #2d3436;
      --text-light: #636e72;
      --error: #dc2626;
      --success: #93c01f;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1rem;
    }

    .container { max-width: 960px; margin: 0 auto; }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    h1 { font-size: 1.5rem; font-weight: 700; }

    .home-btn {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: var(--bg);
      box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      color: var(--text);
      text-decoration: none;
      transition: all 0.2s;
    }

    .home-btn:active {
      box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
    }

    .neo-card {
      border-radius: 20px;
      background: var(--bg);
      box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .neo-card h3 {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      color: var(--text);
    }

    label {
      font-weight: 600;
      font-size: 0.9rem;
      display: block;
      margin-bottom: 0.4rem;
      color: var(--text);
    }

    .neo-input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: none;
      border-radius: 14px;
      background: var(--bg);
      box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
    }

    .neo-input:focus {
      box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
    }

    .file-input-wrap {
      position: relative;
    }

    .file-input-wrap input[type="file"] {
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: 14px;
      background: var(--bg);
      box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
      font-size: 0.85rem;
      color: var(--text-light);
      cursor: pointer;
    }

    .file-input-wrap input[type="file"]::file-selector-button {
      background: var(--brand);
      color: #fff;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      margin-right: 0.75rem;
    }

    .btn-row { display: flex; gap: 0.75rem; flex-wrap: wrap; }

    .neo-btn {
      padding: 0.75rem 1.25rem;
      border-radius: 14px;
      background: var(--bg);
      box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--text);
      transition: all 0.2s;
    }

    .neo-btn:active {
      box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
    }

    .neo-btn.brand {
      background: var(--brand);
      color: #fff;
      box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
    }

    .neo-btn.brand:active {
      box-shadow: inset 3px 3px 6px rgba(0,0,0,0.2), inset -3px -3px 6px rgba(255,255,255,0.1);
    }

    .scan-row {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .scan-row .neo-input { flex: 1; }

    .loading-bar {
      height: 4px;
      background-color: var(--brand);
      border-radius: 2px;
      animation: loading 2s linear infinite;
      margin-top: 0.5rem;
    }

    @keyframes loading {
      0% { width: 0%; }
      50% { width: 100%; }
      100% { width: 0%; }
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin-top: 1rem;
    }

    th, td {
      padding: 0.6rem 0.75rem;
      text-align: left;
      font-size: 0.85rem;
    }

    th {
      background: var(--bg);
      box-shadow: inset 2px 2px 4px var(--shadow-dark), inset -2px -2px 4px var(--shadow-light);
      font-weight: 600;
      color: var(--text);
    }

    th:first-child { border-radius: 10px 0 0 10px; }
    th:last-child { border-radius: 0 10px 10px 0; }

    td {
      border-bottom: 1px solid rgba(163,177,198,0.3);
    }

    tr.highlight-green td { background-color: #d4edda; }
    tr.highlight-orange td { background-color: #fff3cd; }

    .scanned-controls {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .scanned-controls button {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--bg);
      box-shadow: 2px 2px 4px var(--shadow-dark), -2px -2px 4px var(--shadow-light);
      border: none;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--brand);
    }

    .scanned-controls button:active {
      box-shadow: inset 2px 2px 4px var(--shadow-dark), inset -2px -2px 4px var(--shadow-light);
    }

    .scanned-controls span {
      min-width: 24px;
      text-align: center;
      font-weight: 600;
    }

    .feedback { font-size: 0.85rem; margin-top: 0.5rem; }
    .feedback-error { color: var(--error); }
    .feedback-success { color: var(--success); }

    .editable-ean {
      cursor: text;
      background-color: rgba(163,177,198,0.2);
      padding: 2px 6px;
      border-radius: 6px;
      outline: none;
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <h1>PlentyScanner</h1>
      <a href="index.html" class="home-btn" title="Zur Startseite">&#8962;</a>
    </div>

    <div class="neo-card">
      <h3>Wareneingang OSF scannen</h3>
      <div class="file-input-wrap">
        <input type="file" id="deliveryNote" accept=".csv">
      </div>
      <div id="loadingBar" class="loading-bar hidden"></div>
    </div>

    <div class="neo-card">
      <h3>Daten extrahieren</h3>
      <label for="eanInput">EAN scannen:</label>
      <div class="scan-row">
        <input type="text" id="eanInput" placeholder="EAN eingeben" class="neo-input">
        <button onclick="scanEAN()" class="neo-btn brand">Scannen</button>
      </div>
      <div style="margin-top:0.75rem;">
        <button onclick="toggleEditEAN()" id="editEANButton" class="neo-btn">EAN bearbeiten (Deaktiviert)</button>
      </div>
    </div>

    <div class="neo-card">
      <h3>Extrahierte Daten</h3>
      <div id="unknownEANs" class="feedback"></div>
      <table>
        <thead>
          <tr>
            <th>EAN</th>
            <th>Produkt</th>
            <th>Menge</th>
            <th>Gescannt</th>
            <th>Details</th>
          </tr>
        </thead>
        <tbody id="dataTableBody"></tbody>
      </table>
    </div>

    <div class="neo-card">
      <div class="btn-row">
        <button onclick="exportToExcel()" class="neo-btn brand">Als Excel exportieren</button>
        <button onclick="exportToCSV()" class="neo-btn brand">Als CSV exportieren</button>
      </div>
    </div>

    <div class="neo-card hidden" id="uploadPrompt">
      <p class="feedback">Wareneingangsbuchung hochladen, um das Lager zu öffnen</p>
    </div>

    <div id="feedbackMessage"></div>
  </div>

  <script>
    let extractedData = [];
    let unknownEANs = [];
    let isEditingEAN = false;

    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep(frequency, duration, type = 'sine') {
      try {
        const oscillator = audioContext.createOscillator();
        oscillator.type = type;
        oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);
        oscillator.connect(audioContext.destination);
        oscillator.start();
        oscillator.stop(audioContext.currentTime + duration);
      } catch(e) {}
    }

    document.addEventListener('click', () => {
      if (audioContext.state === 'suspended') audioContext.resume();
    }, { once: true });

    document.getElementById('eanInput').addEventListener('keypress', (event) => {
      if (event.key === 'Enter') scanEAN();
    });

    document.getElementById('deliveryNote').addEventListener('change', async (event) => {
      const file = event.target.files[0];
      if (file) {
        document.getElementById('uploadPrompt').classList.add('hidden');
        const loadingBar = document.getElementById('loadingBar');
        loadingBar.classList.remove('hidden');
        try {
          await extractDataFromCSV(file);
        } catch (error) {
          displayFeedback('Fehler: ' + error.message, 'feedback-error');
        } finally {
          loadingBar.classList.add('hidden');
        }
      }
    });

    function consolidateData(data) {
      const consolidatedMap = new Map();
      const noEanItems = [];
      data.forEach(item => {
        const ean = item.ean ? String(item.ean).trim() : '';
        if (ean) {
          if (consolidatedMap.has(ean)) {
            const existingItem = consolidatedMap.get(ean);
            const currentQuantity = parseFloat(String(existingItem.quantity).replace(',', '.')) || 0;
            const newQuantity = parseFloat(String(item.quantity).replace(',', '.')) || 0;
            existingItem.quantity = String(currentQuantity + newQuantity);
            if (item.details && String(item.details).trim() && !existingItem.details.includes(item.details)) {
              existingItem.details += '; ' + item.details;
            }
          } else {
            consolidatedMap.set(ean, { ...item });
          }
        } else {
          noEanItems.push(item);
        }
      });
      return [...Array.from(consolidatedMap.values()), ...noEanItems];
    }

    async function extractDataFromCSV(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const csvText = e.target.result;
            const lines = csvText.split(/\r?\n/).filter(line => line.trim() !== '');
            if (lines.length === 0) { extractedData = []; updateTable(); reject(new Error('Leere CSV-Datei.')); return; }
            const parsedLines = lines.map(line => line.split(';').map(cell => cell.trim().replace(/^"|"$/g, '')));
            if (parsedLines.length < 2) { extractedData = []; updateTable(); reject(new Error('CSV-Datei muss mindestens eine Kopfzeile und eine Datenzeile enthalten.')); return; }
            const rawHeaders = parsedLines[0];
            const normalizedHeaders = rawHeaders.map(h => h.toLowerCase().replace(/[^a-z0-9]/g, ''));
            const dataRows = parsedLines.slice(1);
            const mappedData = dataRows.map(row => {
              const item = { ean: '', product: '', quantity: '0', details: [] };
              let foundEAN = false, foundProduct = false, foundQuantity = false;
              normalizedHeaders.forEach((normalizedHeader, index) => {
                const value = row[index] !== undefined ? String(row[index]).trim() : '';
                if (normalizedHeader.includes('barcode') && !foundEAN) { item.ean = value; foundEAN = true; }
                else if (normalizedHeader.includes('variantenname') && !foundProduct) { item.product = value; foundProduct = true; }
                else if (normalizedHeader.includes('menge') && !foundQuantity) { item.quantity = value.replace(/[^0-9.,]/g, '').replace(',', '.'); if (isNaN(parseFloat(item.quantity))) item.quantity = '0'; foundQuantity = true; }
                else if (value && !item.details.some(d => d.includes(value))) {
                  if (normalizedHeader.includes('lieferanten') || normalizedHeader.includes('lieferscheinnummer') || normalizedHeader.includes('lieferdatum') || normalizedHeader.includes('einkaufspreis') || normalizedHeader.includes('lagerort')) {
                    item.details.push(rawHeaders[index] + ': ' + value);
                  }
                }
              });
              item.ean = item.ean || ''; item.product = item.product || ''; item.quantity = item.quantity || '0';
              item.details = item.details.join(', '); item.scanned = 0;
              return item;
            }).filter(item => item.ean || item.product || parseFloat(item.quantity) > 0);
            extractedData = consolidateData(mappedData);
            if (!extractedData.length) displayFeedback('Keine relevanten Daten extrahiert.', 'feedback-error');
            else displayFeedback(extractedData.length + ' Einträge geladen.', 'feedback-success');
            updateTable(); resolve();
          } catch (error) { reject(new Error('Fehler beim Parsen: ' + error.message)); }
        };
        reader.onerror = (error) => reject(new Error('Fehler beim Lesen: ' + error));
        reader.readAsText(file, 'UTF-8');
      });
    }

    function scanEAN() {
      const ean = document.getElementById('eanInput').value.trim();
      const eanRegex = /^\d{13}$/;
      if (!eanRegex.test(ean)) {
        displayFeedback('Ungültige EAN. Bitte 13-stellige Zahl eingeben.', 'feedback-error');
        playBeep(300, 0.2, 'square');
        return;
      }
      const item = extractedData.find(i => i.ean === ean);
      if (item) {
        item.scanned = (item.scanned || 0) + 1;
        displayFeedback('EAN ' + ean + ' erfolgreich gescannt.', 'feedback-success');
        playBeep(600, 0.2, 'sine');
        updateTable();
        setTimeout(() => {
          document.querySelectorAll('#dataTableBody tr').forEach(row => {
            if (row.dataset.ean === ean) {
              row.scrollIntoView({ behavior: 'smooth', block: 'center' });
              row.style.outline = '3px solid var(--brand)';
              setTimeout(() => row.style.outline = '', 2000);
            }
          });
        }, 100);
      } else {
        unknownEANs.push(ean);
        displayFeedback('EAN ' + ean + ' nicht gefunden.', 'feedback-error');
        playBeep(300, 0.2, 'square');
        updateUnknownEANs();
      }
      document.getElementById('eanInput').value = '';
    }

    function decreaseScanned(ean) {
      const item = extractedData.find(i => i.ean === ean);
      if (item && item.scanned > 0) { item.scanned--; updateTable(); }
    }

    function increaseScanned(ean) {
      const item = extractedData.find(i => i.ean === ean);
      if (item) { item.scanned++; updateTable(); }
    }

    function toggleEditEAN() {
      isEditingEAN = !isEditingEAN;
      const btn = document.getElementById('editEANButton');
      btn.textContent = isEditingEAN ? 'EAN bearbeiten (Aktiviert)' : 'EAN bearbeiten (Deaktiviert)';
      displayFeedback(isEditingEAN ? 'EAN-Bearbeitungsmodus aktiviert.' : 'EAN-Bearbeitungsmodus deaktiviert.', 'feedback-success');
      updateTable();
    }

    function saveEditedEAN(oldEAN, el) {
      const newEAN = el.textContent.trim();
      if (newEAN === oldEAN) { updateTable(); return; }
      if (!/^\d{13}$/.test(newEAN)) { displayFeedback('Ungültige EAN.', 'feedback-error'); el.textContent = oldEAN; return; }
      if (extractedData.find(i => i.ean === newEAN && i.ean !== oldEAN)) { displayFeedback('EAN existiert bereits.', 'feedback-error'); el.textContent = oldEAN; return; }
      const item = extractedData.find(i => i.ean === oldEAN);
      if (item) { item.ean = newEAN; displayFeedback('EAN geändert.', 'feedback-success'); }
      updateTable();
    }

    function updateTable() {
      const tbody = document.getElementById('dataTableBody');
      tbody.innerHTML = '';
      if (!extractedData.length) { displayFeedback('Keine Daten extrahiert.', 'feedback-error'); return; }
      extractedData.forEach(item => {
        const row = document.createElement('tr');
        row.dataset.ean = item.ean || '';
        const quantity = parseFloat(item.quantity) || 0;
        const scanned = item.scanned || 0;
        if (scanned > 0) {
          if (scanned === quantity) row.classList.add('highlight-green');
          else if (scanned > quantity) row.classList.add('highlight-orange');
        }
        const eanCell = isEditingEAN
          ? '<span contenteditable="true" class="editable-ean" onblur="saveEditedEAN(\'' + item.ean + '\', this)">' + (item.ean || '') + '</span>'
          : (item.ean || '');
        row.innerHTML = '<td>' + eanCell + '</td>'
          + '<td>' + (item.product || '') + '</td>'
          + '<td>' + (item.quantity || '') + '</td>'
          + '<td><div class="scanned-controls"><button onclick="decreaseScanned(\'' + item.ean + '\')">-</button><span>' + (item.scanned || 0) + '</span><button onclick="increaseScanned(\'' + item.ean + '\')">+</button></div></td>'
          + '<td>' + (item.details || '') + '</td>';
        tbody.appendChild(row);
      });
      updateUnknownEANs();
      const allScanned = extractedData.length > 0 && extractedData.every(i => parseFloat(i.scanned) === parseFloat(i.quantity));
      document.body.style.backgroundColor = allScanned ? '#d4edda' : '';
    }

    function updateUnknownEANs() {
      const div = document.getElementById('unknownEANs');
      div.innerHTML = unknownEANs.length > 0 ? '<p>Unbekannte EANs: ' + unknownEANs.join(', ') + '</p>' : '';
    }

    function exportToExcel() {
      if (!extractedData.length) { displayFeedback('Keine Daten zum Exportieren.', 'feedback-error'); return; }
      const data = extractedData.map(i => ({ EAN: i.ean, Produkt: i.product, Menge: i.quantity, 'Gescannte EANs': i.scanned || 0, Details: i.details }));
      const ws = XLSX.utils.json_to_sheet(data);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Lager');
      XLSX.writeFile(wb, 'lager_export.xlsx');
    }

    function exportToCSV() {
      if (!extractedData.length) { displayFeedback('Keine Daten zum Exportieren.', 'feedback-error'); return; }
      const headers = ['EAN,Produkt,Menge,Gescannte EANs,Details'];
      const rows = extractedData.map(i => (i.ean || '') + ',' + (i.product || '') + ',' + (i.quantity || '') + ',' + (i.scanned || 0) + ',' + (i.details || ''));
      const csv = [...headers, ...rows].join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'lager_export.csv'; a.click();
      URL.revokeObjectURL(url);
    }

    function displayFeedback(message, type) {
      document.getElementById('feedbackMessage').innerHTML = '<p class="feedback ' + type + '">' + message + '</p>';
    }
  </script>
</body>
</html>
